skill_name: 我的网络（流量/设备/套餐/状态查询）
skill_id: my_network
category: 北大校内服务
auth_level: pku-login-token
base_url: https://portal.pku.edu.cn/portal2017/
request_method: GET
headers_rule:
  Cookie: "SESSION={portal_session}"
  Referer: https://portal.pku.edu.cn/portal2017/#/bizCenter
  Origin: https://portal.pku.edu.cn
session_reuse: true

# ===== 双重验证要求 =====
# 此服务需要：①北大学号+密码 ②手机动态令牌（OTP）
# OTP 为强制要求，不可跳过，不可用其他登录方式绕过
# 需向用户索取：
#   1. 学号和门户密码
#   2. 手机令牌 App（北京大学令牌）当前动态口令（6位数字，有时效）

operation_steps:
  1: |
    【凭据索取（强制 OTP）】
    向用户说明："此功能需要手机动态令牌验证，请打开北京大学令牌 App，
    输入当前显示的6位动态口令（30秒更新一次）。"
    若用户未提供 OTP，停止执行并提示用户获取口令。
  2: |
    【OTP 预检】
    GET https://iaaa.pku.edu.cn/iaaa/isMobileAuthen.do?userName={username}&appId=portal2017&_rand={random}
    若 isMobileAuthen=false：告知"此账号未开启手机令牌，无法访问网络服务"，停止执行。
    若 isMobileAuthen=true：获取 mobileMask，告知用户尾号信息。
  3: |
    【携带 OTP 完成 IAAA 登录，建立门户 SESSION Cookie】
    与 pku_login_session 流程相同，otpCode 字段传入 OTP 口令。
  4: |
    【查询基础网络状态（当前实现）】
    GET https://portal.pku.edu.cn/portal2017/bizcenter/its/getIpgwinfo.do?_rand={random}
    携带 SESSION Cookie
    返回 JSON：IP 地址、在线状态、已用流量等基础信息
  5: |
    【查询网费余额（ITS 跳转，已验证可用）】
    ① GET https://portal.pku.edu.cn/portal2017/util/validAppSysRedirCode.do
       Params: validWay=otpCode&validCode={otp_code}&trustDevice=N
    ② GET https://portal.pku.edu.cn/portal2017/bizcenter/its/redirectToITS.do?modId=web
       allow_redirects=True，最终落地 https://its.pku.edu.cn/export/its?f=web&token=...
       建立 ITS JSESSIONID 会话（从 Set-Cookie 获取）
    ③ GET https://its.pku.edu.cn/netportal/itsUtil?operation=info
       （注意：不要用 ITSipgw?cmd=open，那是连接网关不是查余额，在校外会被拒）
       从返回 HTML 中用正则提取余额：
         r'余\s*额[：:]\s*</td>\s*<td[^>]*>\s*([\d.]+)元'
       或直接取第6个 <td class="td_value"> 的文本内容

selectors:
  # 步骤4 getIpgwinfo.do 接口 → JSON
  basic_status: "response.success / response.msg（未连接校园网时 success=false）"
  # 步骤5 itsUtil?operation=info 页面 → HTML 表格，第6行为余额
  fee_balance: "HTML 正则: r'余\\s*额[：:]\\s*</td>\\s*<td[^>]*>\\s*([\\d.]+)元'"
  account_id: "HTML 正则: r'账\\s*号[：:]\\s*</td>\\s*<td[^>]*>\\s*([\\d]+)'"
  real_name: "HTML 正则: r'姓\\s*名[：:]\\s*</td>\\s*<td[^>]*>\\s*([^<]+)'"
  department: "HTML 正则: r'单\\s*位[：:]\\s*</td>\\s*<td[^>]*>\\s*([^<]+)'"

extra_api:
  otp_check: "https://iaaa.pku.edu.cn/iaaa/isMobileAuthen.do"
  login: "https://iaaa.pku.edu.cn/iaaa/oauthlogin.do"
  sso_callback: "https://portal.pku.edu.cn/portal2017/ssoLogin.do"
  # 步骤4：基础网络状态（校园网内有效，校外返回 success=false）
  ipgw_info: "https://portal.pku.edu.cn/portal2017/bizcenter/its/getIpgwinfo.do"
  # 步骤5：网费余额（校内外均可用）
  otp_unlock: "https://portal.pku.edu.cn/portal2017/util/validAppSysRedirCode.do"
  its_redirect: "https://portal.pku.edu.cn/portal2017/bizcenter/its/redirectToITS.do?modId=web"
  its_account_info: "https://its.pku.edu.cn/netportal/itsUtil?operation=info"
  its_fee_history: "https://its.pku.edu.cn/netportal/charge_self.html"

params_template:
  username: "学号（必填）"
  password: "密码（必填，不保存不输出）"
  otp_code: "手机动态口令（必填，6位数字，有时效，不可省略）"
  query_type: "查询类型：status（网络状态）|fee（网费余额）|traffic（流量）|package（套餐）|all（全部）"

implementation_note: |
  步骤4：src/pku_portal.py::get_network_status()（getIpgwinfo.do，校外返回 success=false 正常）
  步骤5：src/pku_portal.py::get_network_fee(session, otp_code)（ITS 跳转 + itsUtil?operation=info，校内外均可用）
  CLI命令：python src/main.py network --otp {6位口令}

exception_strategy: |
  - 未提供 OTP：告知用户此服务强制需要手机令牌，停止执行，不尝试绕过
  - OTP 错误（IAAA 返回失败）：告知"动态口令错误"，停止执行，不自动重试
  - getIpgwinfo.do 返回非正常：可能未连接校园网，提示"当前未连接校园网络"
  - ITS 跳转后仍跳回 /#/checkOtpcode/：OTP 已过期，告知用户重新获取口令
  - ITS 会话建立失败：输出错误信息，不启动 Playwright

