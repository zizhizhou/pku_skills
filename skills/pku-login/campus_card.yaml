skill_name: 校园卡信息查询
skill_id: campus_card
category: 北大校内服务
auth_level: pku-login
base_url: https://portal.pku.edu.cn/portal2017/
request_method: POST
headers_rule:
  Cookie: "SESSION={portal_session}"
  Content-Type: application/x-www-form-urlencoded
  Referer: https://portal.pku.edu.cn/portal2017/#/bizCenter
  Origin: https://portal.pku.edu.cn
session_reuse: true

# ===== 登录要求 =====
# 执行前必须完成 pku_login_session 流程，获取有效 SESSION Cookie
# 需向用户索取：学号、密码（OTP 按需）

operation_steps:
  1: |
    【前置】完成 pku_login_session 登录，获取 SESSION Cookie
  2: |
    【快速余额查询（门户消息接口）】
    POST https://portal.pku.edu.cn/portal2017/account/getMessage.do
    响应中 cardBalance 字段即为校园卡当前余额
  3: |
    【完整校园卡信息（card.pku.edu.cn）】
    通过门户 portlet 跳转至 https://card.pku.edu.cn（需 SSO 认证）
    或直接访问：https://card.pku.edu.cn/Category/Page?name=NewsServiceIntroduction&id=14
  4: |
    解析返回数据，提取：卡号、余额、消费记录、充值记录、挂失状态

selectors:
  quick_balance: "response.cardBalance"
  card_info: ".card-balance / .card-number / .card-status"
  transaction_list: "table.transaction-list tr"
extra_api:
  portal_message: "https://portal.pku.edu.cn/portal2017/account/getMessage.do"
  card_portal: "https://card.pku.edu.cn/"
  card_page: "https://card.pku.edu.cn/Category/Page?name=NewsServiceIntroduction&id=14&pid=10"
params_template:
  # getMessage.do 无需参数，直接 POST 返回卡余额等消息摘要
  # 若需详细交易记录，需跳转至 card.pku.edu.cn
exception_strategy: |
  - getMessage.do 返回 401：SESSION 过期，重新登录
  - cardBalance 字段为空：可能账号无校园卡，提示"未查询到校园卡信息"
  - card.pku.edu.cn SSO 失败：输出错误，不启动 Playwright
