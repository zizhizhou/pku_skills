skill_name: 小北系列服务（讲座/演出/招聘/资讯/对话）
skill_id: xiaobei_series
category: 北大校内服务
auth_level: pku-login
base_url: https://portal.pku.edu.cn/portal2017/
request_method: POST
headers_rule:
  Cookie: "SESSION={portal_session}"
  Referer: https://portal.pku.edu.cn/portal2017/#/bizCenter
  Origin: https://portal.pku.edu.cn
session_reuse: true

# ===== 登录要求 =====
# 执行前必须完成 pku_login_session 流程，获取有效 SESSION Cookie
# 需向用户索取：学号、密码（OTP 按需）

operation_steps:
  1: |
    【前置】完成 pku_login_session 登录，获取 SESSION Cookie
  2: |
    【获取小北系列 portlet 地址】
    POST https://portal.pku.edu.cn/portal2017/account/retrBizCenterAll.do
    在返回的 all[].rows[] 中找 portletName 含"小北"/"讲座"/"演出"/"招聘" 的条目
    获取对应 portletHref（每类服务有独立 href）
  3: |
    【访问子服务】
    GET {portletHref}（通过 bizcenter/sgims/retrSubPortlets.do 获取子菜单）
    携带 SESSION Cookie 完成 SSO 认证
  4: |
    解析服务页面返回的 JSON/HTML，提取活动/讲座/招聘/资讯列表
  5: |
    按类型返回：讲座（时间/题目/主讲人/地点）、演出（时间/节目/票价）、
    招聘（公司/职位/截止日期）、资讯（标题/摘要/链接）

services:
  xiaobei_chat: "小北对话（AI问答交互）"
  xiaobei_lecture: "讲座查询"
  xiaobei_show: "演出查询"
  xiaobei_recruit: "校园招聘"
  xiaobei_info: "其他资讯"

selectors:
  portlet_list: "response.all[].rows[?portletName contains '小北' || portletName contains '讲座'].portletHref"
  item_list: "[].{title: title, time: startTime, location: location, detail: description}"
  content_text: "title / time / location / description"
extra_api:
  biz_center_all: "https://portal.pku.edu.cn/portal2017/account/retrBizCenterAll.do"
  sub_portlets: "https://portal.pku.edu.cn/portal2017/bizcenter/sgims/retrSubPortlets.do?parent={bizId}"
params_template:
  service_type: "服务类型：chat|lecture|show|recruit|info"
  keyword: "搜索关键词（可选）"
  startDate: "开始日期（可选），格式 YYYY-MM-DD"
  endDate: "结束日期（可选）"
  pageNo: "页码（默认1）"
  pageSize: "每页条数（默认20）"
exception_strategy: |
  - SESSION 无效（401）：重新执行 pku_login_session 登录
  - portletHref 未找到：提示"未找到小北服务入口"
  - 列表为空：提示"当前无相关活动/信息"
  - 接口失效：输出原始错误，不启动 Playwright
