skill_name: 已办事项查询
skill_id: completed_tasks
category: 北大校内服务
auth_level: pku-login
base_url: https://portal.pku.edu.cn/portal2017/
request_method: POST
headers_rule:
  Cookie: "SESSION={portal_session}"
  Content-Type: application/json; charset=UTF-8
  Referer: https://portal.pku.edu.cn/portal2017/#/biz/todo
  Origin: https://portal.pku.edu.cn
session_reuse: true

# ===== 登录要求 =====
# 执行前必须完成 pku_login_session 流程，获取有效 SESSION Cookie
# 需向用户索取：学号、密码（OTP 按需）

operation_steps:
  1: |
    【前置】完成 pku_login_session 登录，获取 SESSION Cookie
  2: |
    【查询已办事项】
    POST https://portal.pku.edu.cn/portal2017/bizcenter/todo/retrMyCompletedList.do
    携带 SESSION Cookie，Body 为空
  3: |
    解析返回 JSON：completedList（已办列表）、completedNum（总数）
  4: |
    提取每条记录：事项名称、办理时间、状态、关联业务链接
  5: |
    格式化输出已办事项列表，按时间倒序排列

selectors:
  container: "response.completedList[]"
  data_list: "completedList[].{name: taskName, time: completeTime, status: status, link: url}"
  content_text: "taskName / completeTime / status"
extra_api:
  completed_list: "https://portal.pku.edu.cn/portal2017/bizcenter/todo/retrMyCompletedList.do"
  todo_list: "https://portal.pku.edu.cn/portal2017/bizcenter/todo/retrMyTodoList.do"
  todo_count: "https://portal.pku.edu.cn/portal2017/bizcenter/todo/getMyTodoNum.do"
params_template:
  # retrMyCompletedList.do 和 retrMyTodoList.do 均为 POST，无需额外参数
  # 若需分页，可尝试传入 pageNo / pageSize
exception_strategy: |
  - SESSION 无效（401）：重新执行 pku_login_session 登录
  - completedList 为空：提示"暂无已办事项记录"
  - 接口失效：输出原始错误，不启动 Playwright
