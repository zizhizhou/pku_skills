skill_name: 北大微信公众号列表与文章采集
skill_id: pku_wechat_accounts
category: 北大校内服务
auth_level: wechat-login

description: |
  维护一份北大相关微信公众号列表（内置默认 + 用户自定义），
  支持查看列表、添加/删除公众号、获取文章列表、抓取文章正文。
  列表持久化存储于 .wechat_accounts.json，内置默认不可被 force_refresh 覆盖。

